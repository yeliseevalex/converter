name: Deploy Converter

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /srv/projects/converter
            git pull origin main
            cd api
            npm ci --omit=dev
            sudo systemctl restart converter-api
            sudo systemctl status converter-api --no-pager
            API_PORT="3001"
            if [ -f /srv/projects/converter/api/.env ]; then
              PORT_LINE="$(grep -E '^PORT=' /srv/projects/converter/api/.env | tail -n 1 || true)"
              if [ -n "${PORT_LINE}" ]; then
                API_PORT="${PORT_LINE#PORT=}"
                API_PORT="${API_PORT//\"/}"
                API_PORT="$(echo "${API_PORT}" | tr -d '[:space:]')"
              fi
            fi

            ok="0"
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${API_PORT}/health" >/dev/null; then
                ok="1"
                break
              fi
              sleep 1
            done

            if [ "${ok}" != "1" ]; then
              echo "❌ Health check failed on http://127.0.0.1:${API_PORT}/health"
              sudo journalctl -u converter-api -n 80 --no-pager || true
              exit 1
            fi
            echo "✅ Frontend and API deployed successfully"
