name: Deploy Converter

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            cd /srv/projects/converter
            git pull origin main
            cd api
            npm ci --omit=dev
            sudo systemctl restart converter-api
            sudo systemctl status converter-api --no-pager
            echo "✅ Frontend and API deployed successfully"
